<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <div class="main">
        <div class="container1">
            <div>
                <h1>JOB APPLICATION</h1>
                <strong class="companyName"><i>Harmoni Kertif Group</i></strong> <br>
                <i class="companyName">108 N Platinum Ave Deming, NY 88030</i>
            </div>
            <div class="logo">
                <div class="row">
                    <div class="box1"><span class="circle"></span></div>
                    <div class="box2"><span class="circle"></span></div>
                    <div class="box2"><span class="circle"></span></div>
                    <div class="box1"><span class="circle"></span></div>
                </div>
            </div>
        </div>

        <div class="container2">
            <div>
                <span class="iconcontainer"><img src="../../fixtures/phone-solid.png" alt="" class="iconstyle">210-788-8298</span>
            </div>
            <div>
                <span class="iconcontainer"><img src="../../fixtures/envelope-solid.png" alt="" class="iconstyle">info@harmonikertif.com</span>
            </div>
            <div>
                <span  class="iconcontainer"><img src="../../fixtures/globe-solid.png" alt="" class="iconstyle">www.harmonikretif.com</span>
            </div>
        </div>

        <div class="container3">
            <div>
                <h2>PERSONAL INFORMATION</h2>
                <form action="" method="get">
                    <div class="grid-container">
                        <div class="inputContainer">
                            <label for="firstname" class="inputLabel">First Name <span class="required">*</span></label>
                            <input type="text" name="firstname" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="lastname" class="inputLabel">Last Name <span class="required">*</span></label>
                            <input type="text" name="lastname" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="gender" class="inputLabel">Gender <span class="required">*</span></label>
                            <div>
                                <input type="radio" value="male">
                                <label for="gender">Male</label>
                                <input type="radio" value="male">
                                <label for="gender">Male</label>
                            </div>
                        </div>
                        <div class="inputContainer">
                            <label for="mobile" class="inputLabel">Phone <span class="required">*</span></label>
                            <input type="tel" name="mobile" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="dob" class="inputLabel">Date of Birth <span class="required">*</span></label>
                            <input type="date" name="dob" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="address" class="inputLabel">Address <span class="required">*</span></label>
                            <input type="text" name="address" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="street" class="inputLabel">Street <span class="required">*</span></label>
                            <input type="text" name="street" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="city" class="inputLabel">City <span class="required">*</span></label>
                            <input type="text" name="city" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="zipcode" class="inputLabel">ZIP Code <span class="required">*</span></label>
                            <input type="text" name="zipcode" class="textInput" required>
                        </div>
                        <div class="inputContainer">
                            <label for="resume" class="inputLabel">Resume <span class="required">*</span></label>
                            <input type="file" name="resume" required>
                        </div>
                    </div>
                    <div>
                        <input type="submit" class="submit">
                    </div>
                </form>
            </div>
        </div>
    </div>

    
    <script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script>
</body>

</html>
