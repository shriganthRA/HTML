<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        form div label span {
            color: red;
        }

        main {
            display: flex;
            justify-content: center;
        }

        main form {
            padding: 24px;
        }

        .text {
            width: 240px;
        }

        main form div {
            padding: 8px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
        }
        
        .submit-btn {
            background-color: rgb(4, 184, 4);
            color: white;
            width: 80px;
            height: 32px;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    
    <header>
        <h2>Support Satisfaction Factory</h2>
        <p>Please fill out this support satisfaction survey</p>
    </header>

    <hr>

    <main>
        <form action=""  method="get">
            <div>
                <label for="name">Full Name <span>*</span></label> <br>
                <input class="text" type="text" name="name" required>
            </div>

            <div>
                <label for="email">Email <span>*</span></label> <br>
                <input class="text" type="email" name="email" required>
            </div>

            <div>
                <label for="query1">Was this support useful? <span>*</span></label> <br>
                <input type="radio" value="very useful" required>
                <label for="query1">Very useful</label> <br>
                <input type="radio" value="useful" required>
                <label for="query1">useful</label> <br>
                <input type="radio" value="average" required>
                <label for="query1">Average</label> <br>
                <input type="radio" value="not useful" required0>
                <label for="query1">Not useful</label> <br>
                <input type="radio" value="not useful at all" required>
                <label for="query1">Not useful at all</label>
            </div>

            <div>
                <label for="query2">How long did it take for the support team to respond to you? <span>*</span></label> <br>
                <input type="radio" value="0 - 10 mins" required>
                <label for="query2">0 - 10 mins</label> <br>
                <input type="radio" value="10 - 30 mins" required>
                <label for="query2">10 - 30 mins</label> <br>
                <input type="radio" value="1 - 3 hours" required>
                <label for="query2">1 - 3 hours</label> <br>
                <input type="radio" value="3 - 6 hours" required>
                <label for="query2">3 - 6 hours</label> <br>
                <input type="radio" value="6+ hours" required>
                <label for="query2">6+ hours</label>
            </div>

            <div>
                <label for="query3">Supporters Qualification <span>*</span></label>
                <table border="1" cellpadding="8px" cellspacing="0.5px">
                    <tr>
                        <th></th>
                        <th>Very good</th>
                        <th>Good</th>
                        <th>Average</th>
                        <th>Poor</th>
                        <th>Very poor</th>
                    </tr>
                    <tr>
                        <th><label for="row1">Overall Knowldge</label></th>
                        <td><input type="radio" name="row1"></td>
                        <td><input type="radio" name="row1"></td>
                        <td><input type="radio" name="row1"></td>
                        <td><input type="radio" name="row1"></td>
                        <td><input type="radio" name="row1"></td>
                    </tr>
                    <tr>
                        <th><label for="row2">Solving Method</label></th>
                        <td><input type="radio" name="row2"></td>
                        <td><input type="radio" name="row2"></td>
                        <td><input type="radio" name="row2"></td>
                        <td><input type="radio" name="row2"></td>
                        <td><input type="radio" name="row2"></td>
                    </tr>
                    <tr>
                        <th><label for="row3">Clarity</label></th>
                        <td><input type="radio" name="row3"></td>
                        <td><input type="radio" name="row3"></td>
                        <td><input type="radio" name="row3"></td>
                        <td><input type="radio" name="row3"></td>
                        <td><input type="radio" name="row3"></td>
                    </tr>
                    <tr>
                        <th><label for="row4">Friendliness</label></th>
                        <td><input type="radio" name="row4"></td>
                        <td><input type="radio" name="row4"></td>
                        <td><input type="radio" name="row4"></td>
                        <td><input type="radio" name="row4"></td>
                        <td><input type="radio" name="row4"></td>
                    </tr>
                </table>
            </div>

            <div class="btn-container">
                <input type="submit" class="submit-btn">
            </div>
        </form>
    </main>
</body>
</html>
