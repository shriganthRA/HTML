<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Ordered list</h1>
    <ol type="1" start="5">
        <li>bob</li>
        <li>alice</li>
    </ol>

    <br>

    <h1>Unordered list</h1>
    <ul type="square">
        <li>Bob</li>
        <li>alice</li>
    </ul>

    <br>
    <h1>description list</h1>
    <dl>
        <dt>html</dt>
        <dd>Lorem ipsum dolor sit amet.</dd>
        <dt>css</dt>
        <dd>Lorem ipsum dolor sit amet.</dd>
    </dl>


    <h1>Nested list</h1>
    <ul>
        <li>Main category 1</li>
        <ol>
            <li>Subcategory 1.1</li>
            <li>Subcategory 1.2</li>
        </ol>
        <li>Main category 2</li>
        <ul>
            <li>Subcategory 2.1</li>
            <li>Sub category 2.2</li>
        </ul>
    </ul>
</body>
</html>
